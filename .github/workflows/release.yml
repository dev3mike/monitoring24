name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: monitoring24-linux-amd64
          - name: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            output: monitoring24-linux-arm64
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            output: monitoring24-windows-amd64.exe
          - name: macos-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            output: monitoring24-darwin-amd64
          - name: macos-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            output: monitoring24-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          VERSION="${GITHUB_SHA::7}"
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
          go build -ldflags "-s -w -X main.version=${VERSION}" \
          -o "${{ matrix.output }}" ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish/Update release
        uses: ncipollo/release-action@v1
        with:
          tag: master-build
          name: master-build
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: true
          makeLatest: false
          artifacts: "dist/**/*"
